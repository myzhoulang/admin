<div class="middle-box text-center">
	<div>
		<h1 class="logo-name">A+</h1>
		<h3>注册 A+ 帐号</h3>
		<p>创建一个A+用户</p>

		<form class="m-t" name="registerForm" ng-submit="register(f)">
			<div class="form-group">
				<label class="sr-only" for="name">姓名</label>
				<input type="text" id="name" name="name" ng-model="f.name" class="form-control" placeholder="姓名"/>
				<p class="help-block"></p>
			</div>

			<div class="form-group" ng-class="{'has-error': registerForm.email.$invalid && registerForm.$submitted}">
				<label class="sr-only" for="email">Email 地址</label>
				<input type="email" id="email" name="email" ng-model="f.email" class="form-control" placeholder="Email" required />

				<p class="help-block text"></p>
				<p class="help-block text-left" ng-show="registerForm.email.$invalid && registerForm.$submitted">Email 格式不正确</p>
			</div>

			<div class="form-group">
				<label class="sr-only" for="password">密码</label>
				<input type="password" id="password" name="password" ng-model="f.password" class="form-control" placeholder="密码" required />
				<p class="help-block text-left" ng-show="registerForm.password.$invalid && registerForm.$submitted">请输入密码</p>
			</div>

			<div class="form-group">
				<label class="sr-only" for="confirm-password">确认密码</label>
				<input type="password" id="confirm-password" name="confirmPassword" ng-model="f.confirmPassword" class="form-control" placeholder="密码确认" required />
				<p class="help-block text-left" ng-show="registerForm.confirmPassword.$invalid && registerForm.$submitted">请确认密码</p>
			</div>

			<div class="form-group">
				<!--todo-->
				<div class="checkbox">
					<label>
						<input type="checkbox" ng-model="isAgree"/>
						<a href="#" class="text-muted">同意条款和政策</a>
					</label>
				</div>
			</div>

			<button type="submit" class="btn btn-primary btn-block">注册</button>

			<p class="text-muted text-center m-t-sm">已经有一个账户了？</p>

			<a ui-sref="login" class="btn btn-primary btn-block">登录</a>
		</form>
	</div>
</div>
