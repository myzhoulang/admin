<div class="container middle-box m-t-lg">
	<div class="row">
		<div class="col-lg-12">
			<div class="ibox-content">
				<h2 class="font-bold">Forget password</h2>

				<p>Enter your email address and your password will be reset and emailed to you.</p>

				<div class="row">
					<div class="col-lg-12">
						<form ng-submit="goIndex()" class="m-t-sm">
							<div class="form-group">
								<label for="email" class="sr-only">Email address</label>
								<input id="email" style="-webkit-box-shadow: none" type="email" ng-model="f.email" class="form-control" placeholder="Email address" required/>
							</div>
							<button type="submit" class="btn btn-primary btn-block">Send new password</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<hr/>

	<div class="row">
		<div class="col-xs-8">Copyright Example Company</div>
		<div class="col-xs-4 text-right"><small>© 2014-2015</small></div>
	</div>
</div>
