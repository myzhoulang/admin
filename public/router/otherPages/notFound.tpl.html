<div class="middle-box text-center">
  <h1>404</h1>
  <h3>Page Not Found</h3>
  <div class="error-desc">
    Sorry, but the page you are looking for has not been found. Try checking the URL for error, then hit the refresh button on your browser or try found something else in our app.
  </div>

  <form ng-submit="search()" class="form-inline m-t">
    <div class="form-group">
      <label for="search-input" class="sr-only">Search for page</label>
      <input id="search-input" type="text" class="form-control" placeholder="Search for page" ng-model="f.search"/>
      <button class="btn btn-primary" type="submit">Search</button>
    </div>
  </form>
  <p class="m-t-sm">or</p>
  <a ui-sref="home.index" class="btn btn-primary btn-block">back</a>
</div>
